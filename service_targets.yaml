selection_probe_url: https://auth.openai.com
probe_timeout_ms: 10000

probe_targets:
  - name: api_openai
    url: https://api.openai.com
  - name: auth_openai
    url: https://auth.openai.com
  - name: chatgpt
    url: https://chatgpt.com
  - name: medium
    url: https://medium.com
  - name: gemini
    url: https://gemini.google.com
  - name: gemini_api
    url: https://generativelanguage.googleapis.com
  - name: claude
    url: https://claude.ai
  - name: anthropic_api
    url: https://api.anthropic.com
  - name: perplexity
    url: https://www.perplexity.ai
  - name: perplexity_api
    url: https://api.perplexity.ai
  - name: cursor
    url: https://cursor.com
  - name: cursor_api
    url: https://api.cursor.com
  - name: cursor_app
    url: https://api2.cursor.sh

route_rules:
  - DOMAIN-SUFFIX,openai.com,AI_AUTO
  - DOMAIN-SUFFIX,chatgpt.com,AI_AUTO
  - DOMAIN-SUFFIX,oaistatic.com,AI_AUTO
  - DOMAIN-SUFFIX,oaiusercontent.com,AI_AUTO
  - DOMAIN-SUFFIX,medium.com,AI_AUTO
  - DOMAIN-SUFFIX,gemini.google.com,AI_AUTO
  - DOMAIN-SUFFIX,aistudio.google.com,AI_AUTO
  - DOMAIN-SUFFIX,ai.google.dev,AI_AUTO
  - DOMAIN-SUFFIX,generativelanguage.googleapis.com,AI_AUTO
  - DOMAIN-SUFFIX,claude.ai,AI_AUTO
  - DOMAIN-SUFFIX,anthropic.com,AI_AUTO
  - DOMAIN-SUFFIX,perplexity.ai,AI_AUTO
  - DOMAIN-SUFFIX,cursor.com,AI_AUTO
  - DOMAIN-SUFFIX,cursor.sh,AI_AUTO
